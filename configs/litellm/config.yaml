model_list:
  # The unified LiteLLM router. Open WebUI and local apps connect to this.
  # LiteLLM transparently routes all reasoning model requests to the single `llama-reasoning` instance.
  
  - model_name: qwen3-8b
    litellm_params:
      model: openai/qwen3-8b
      api_base: http://llama-reasoning:8080/v1
      api_key: sk-1234
      
  - model_name: gemma-4
    litellm_params:
      model: openai/gemma-4
      api_base: http://llama-reasoning:8080/v1
      api_key: sk-1234
      
  - model_name: qwen3-coder-7b
    litellm_params:
      model: openai/qwen3-coder-7b
      api_base: http://llama-reasoning:8080/v1
      api_key: sk-1234
      
  # The embedding model is routed to the secondary container to ensure RAG works 
  # regardless of which reasoning model is currently loaded.
  - model_name: bge-small-en-v1.5
    litellm_params:
      model: openai/bge-small-en-v1.5
      api_base: http://llama-embedding:8081/v1
      api_key: sk-1234
      
litellm_settings:
  drop_params: true
  set_verbose: false
